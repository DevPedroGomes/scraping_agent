services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: scraper-api
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 512m
    env_file:
      - .env
    volumes:
      - ./backend/data:/app/data
    # Backend is isolated on an internal-only network. Only the frontend can
    # reach it. No Traefik / public ingress.
    networks:
      - scraper-internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Empty string makes the API client use same-origin URLs ("/api/...").
        # Next.js rewrites then forward those calls to the internal backend.
        - NEXT_PUBLIC_API_URL=
    container_name: scraper-frontend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
    depends_on:
      backend:
        condition: service_healthy
    # Frontend bridges the internal scraper network and the public proxy network.
    networks:
      - scraper-internal
      - proxy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.scraper.entrypoints=https"
      - "traefik.http.routers.scraper.rule=Host(`scraper.pgdev.com.br`)"
      - "traefik.http.routers.scraper.tls=true"
      - "traefik.http.routers.scraper.tls.certresolver=letsencrypt"
      - "traefik.http.routers.scraper.middlewares=scraper-security@docker,global-ratelimit@file,strip-server-header@file"
      - "traefik.http.services.scraper.loadbalancer.server.port=3000"
      # Security Headers
      - "traefik.http.middlewares.scraper-security.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.scraper-security.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.scraper-security.headers.stsPreload=true"
      - "traefik.http.middlewares.scraper-security.headers.forceSTSHeader=true"
      - "traefik.http.middlewares.scraper-security.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.scraper-security.headers.browserXssFilter=true"
      - "traefik.http.middlewares.scraper-security.headers.referrerPolicy=strict-origin-when-cross-origin"
      - "traefik.http.middlewares.scraper-security.headers.frameDeny=true"

networks:
  proxy:
    external: true
  scraper-internal:
    driver: bridge
    # NOTE: cannot be `internal: true` — backend needs outbound DNS + HTTP to
    # reach scrape targets and BYOK LLM provider (Groq/OpenRouter). The SSRF
    # guard in `app/services/scraper_service.py::is_safe_url` already blocks
    # private/loopback/metadata IPs, so opening egress is safe.
